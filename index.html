<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>→ Notion</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #09090b;
      --surface: #0f0f12;
      --border: #1c1c21;
      --border2: #2a2a32;
      --text: #e8e4dc;
      --muted: #52525b;
      --accent: #818cf8;
      --accent-bg: #1a1a2e;
      --accent-border: #2d2d4e;
      --green: #4ade80;
      --red: #f87171;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: Georgia, serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent-border);
    }

    .title {
      font-family: monospace;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .headline {
      font-size: 26px;
      font-weight: 400;
      line-height: 1.3;
      color: var(--text);
    }

    .sub {
      font-family: monospace;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.7;
    }

    .step {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
    }

    .step-num {
      font-family: monospace;
      font-size: 11px;
      color: var(--muted);
      background: var(--bg);
      border: 1px solid var(--border2);
      border-radius: 4px;
      width: 22px; height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .step-text {
      font-size: 13px;
      line-height: 1.6;
      color: var(--text);
    }

    .step-text span {
      font-family: monospace;
      font-size: 11px;
      color: var(--accent);
      background: var(--accent-bg);
      border: 1px solid var(--accent-border);
      border-radius: 3px;
      padding: 1px 6px;
    }

    textarea {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 14px 16px;
      color: var(--text);
      font-family: monospace;
      font-size: 12px;
      line-height: 1.7;
      resize: vertical;
      min-height: 160px;
      outline: none;
      -webkit-appearance: none;
      transition: border-color 0.15s;
    }

    textarea:focus { border-color: var(--accent-border); }
    textarea::placeholder { color: var(--muted); }

    .save-btn {
      width: 100%;
      background: var(--accent-bg);
      border: 1px solid var(--accent-border);
      color: var(--accent);
      padding: 14px;
      border-radius: 8px;
      cursor: pointer;
      font-family: monospace;
      font-size: 13px;
      letter-spacing: 0.08em;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .save-btn:disabled {
      background: var(--surface);
      border-color: var(--border);
      color: var(--muted);
      cursor: not-allowed;
    }

    .save-btn.loading {
      background: var(--accent-bg);
      border-color: var(--accent-border);
      color: var(--muted);
      cursor: not-allowed;
    }

    .save-btn.success {
      background: #14532d;
      border-color: var(--green);
      color: var(--green);
    }

    .save-btn.error {
      background: #450a0a;
      border-color: var(--red);
      color: var(--red);
    }

    .hint {
      font-family: monospace;
      font-size: 10px;
      color: #222;
      text-align: center;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

<div class="card">
  <div>
    <div class="header">
      <div class="dot"></div>
      <span class="title">Brainstorm → Notion</span>
    </div>
  </div>

  <div>
    <div class="headline">Session speichern.</div>
  </div>

  <div class="step">
    <div class="step-num">1</div>
    <div class="step-text">
      ChatGPT Konversation öffnen → oben rechts auf <span>Kopieren</span> klicken
    </div>
  </div>

  <div class="step">
    <div class="step-num">2</div>
    <div class="step-text">
      Text unten einfügen <span>⌘V</span> oder langes Tippen → Einfügen
    </div>
  </div>

  <div class="step">
    <div class="step-num">3</div>
    <div class="step-text">
      Auf <span>→ Notion speichern</span> tippen — fertig.
    </div>
  </div>

  <textarea
    id="textInput"
    placeholder="Konversation hier einfügen..."
  ></textarea>

  <button class="save-btn" id="saveBtn" disabled>→ Notion speichern</button>

  <div class="hint">Wird strukturiert via Claude + n8n in Notion abgelegt.</div>
</div>

<script>
  const WEBHOOK = "https://n8n.louis-assel.de/webhook/brainstorm-to-notion";

  const textInput = document.getElementById("textInput");
  const saveBtn = document.getElementById("saveBtn");

  textInput.addEventListener("input", () => {
    saveBtn.disabled = !textInput.value.trim();
    saveBtn.className = "save-btn";
    saveBtn.textContent = "→ Notion speichern";
  });

  saveBtn.addEventListener("click", async () => {
    const text = textInput.value.trim();
    if (!text) return;

    saveBtn.disabled = true;
    saveBtn.className = "save-btn loading";
    saveBtn.textContent = "Speichere...";

    try {
      const res = await fetch(WEBHOOK, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text }),
      });

      if (res.ok) {
        saveBtn.className = "save-btn success";
        saveBtn.textContent = "✓ In Notion gespeichert";
        textInput.value = "";
        textInput.dispatchEvent(new Event("input"));
      } else {
        throw new Error("HTTP " + res.status);
      }
    } catch (err) {
      saveBtn.className = "save-btn error";
      saveBtn.textContent = "✗ Fehler — nochmal versuchen";
      saveBtn.disabled = false;
    }
  });
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Brainstorm Studio</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #09090b;
      --surface: #0f0f12;
      --border: #1c1c21;
      --border2: #2a2a32;
      --text: #e8e4dc;
      --muted: #52525b;
      --accent: #818cf8;
      --accent-bg: #1a1a2e;
      --accent-border: #2d2d4e;
      --green: #4ade80;
      --red: #f87171;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: Georgia, 'Times New Roman', serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* SETUP SCREEN */
    #setup {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .setup-card {
      width: 100%;
      max-width: 380px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px 24px;
    }

    .setup-label {
      font-family: monospace;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 20px;
    }

    .setup-title {
      font-size: 22px;
      font-weight: 400;
      margin-bottom: 8px;
      line-height: 1.3;
    }

    .setup-sub {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 24px;
      line-height: 1.6;
      font-family: monospace;
    }

    .setup-input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border2);
      border-radius: 6px;
      padding: 12px 14px;
      color: var(--text);
      font-family: monospace;
      font-size: 13px;
      outline: none;
      margin-bottom: 12px;
      -webkit-appearance: none;
    }

    .setup-input:focus { border-color: var(--accent-border); }

    .setup-btn {
      width: 100%;
      background: var(--accent-bg);
      border: 1px solid var(--accent-border);
      color: var(--accent);
      padding: 12px;
      border-radius: 6px;
      cursor: pointer;
      font-family: monospace;
      font-size: 13px;
      letter-spacing: 0.05em;
      transition: all 0.15s;
    }

    .setup-btn:disabled {
      background: var(--surface);
      border-color: var(--border);
      color: var(--muted);
      cursor: not-allowed;
    }

    /* CHAT SCREEN */
    #chat { display: none; flex-direction: column; height: 100dvh; }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      flex-shrink: 0;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px #4ade8066;
    }

    .header-title {
      font-family: monospace;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .header-right { display: flex; gap: 6px; }

    .btn-small {
      background: transparent;
      border: 1px solid var(--border2);
      color: var(--muted);
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-family: monospace;
      font-size: 11px;
      letter-spacing: 0.05em;
      white-space: nowrap;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-notion {
      background: var(--accent-bg);
      border-color: var(--accent-border);
      color: var(--accent);
    }

    .btn-notion.success {
      background: #14532d;
      border-color: var(--green);
      color: var(--green);
    }

    .btn-notion.error {
      background: #450a0a;
      border-color: var(--red);
      color: var(--red);
    }

    /* Messages */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      -webkit-overflow-scrolling: touch;
    }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--border2);
      text-align: center;
      padding: 40px 20px;
      gap: 12px;
    }

    .empty-icon { font-size: 36px; }
    .empty-text { font-size: 15px; line-height: 1.6; color: #333; }
    .empty-sub { font-size: 12px; color: #222; font-family: monospace; }

    .msg { display: flex; flex-direction: column; }
    .msg.user { align-items: flex-end; }
    .msg.assistant { align-items: flex-start; }

    .msg-label {
      font-family: monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--border2);
      margin-bottom: 5px;
    }

    .msg-bubble {
      max-width: 88%;
      padding: 12px 16px;
      font-size: 14px;
      line-height: 1.75;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.user .msg-bubble {
      background: #111;
      border: 1px solid #222;
      border-radius: 14px 14px 3px 14px;
      color: #ccc;
    }

    .msg.assistant .msg-bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px 14px 14px 3px;
      color: var(--text);
    }

    /* Typing indicator */
    .typing { display: flex; gap: 5px; align-items: center; padding: 14px 16px; }
    .typing-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--muted);
      animation: blink 1.2s infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 100% { opacity: 0.3; transform: scale(0.85); }
      50% { opacity: 1; transform: scale(1); }
    }

    /* Input area */
    .input-area {
      border-top: 1px solid var(--border);
      padding: 12px 16px;
      background: var(--bg);
      flex-shrink: 0;
      padding-bottom: max(12px, env(safe-area-inset-bottom));
    }

    .input-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 10px;
      padding: 10px 12px;
    }

    .input-row:focus-within { border-color: var(--accent-border); }

    textarea {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: Georgia, serif;
      font-size: 15px;
      line-height: 1.5;
      resize: none;
      min-height: 24px;
      max-height: 120px;
      overflow-y: auto;
      -webkit-appearance: none;
    }

    textarea::placeholder { color: var(--muted); }

    .icon-btn {
      width: 34px; height: 34px;
      border-radius: 8px;
      border: 1px solid var(--border2);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .icon-btn.active, .icon-btn:active {
      background: var(--accent-bg);
      border-color: var(--accent-border);
      color: var(--accent);
    }

    .icon-btn.recording {
      background: #450a0a;
      border-color: #7f1d1d;
      color: var(--red);
      animation: pulse-red 1s infinite;
    }

    @keyframes pulse-red {
      0%, 100% { box-shadow: 0 0 0 0 #f8717144; }
      50% { box-shadow: 0 0 0 4px #f8717122; }
    }

    .send-btn {
      width: 34px; height: 34px;
      border-radius: 8px;
      border: 1px solid var(--accent-border);
      background: var(--accent-bg);
      color: var(--accent);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .send-btn:disabled {
      background: transparent;
      border-color: var(--border);
      color: var(--border2);
      cursor: not-allowed;
    }

    .hint {
      font-family: monospace;
      font-size: 10px;
      color: #1e1e1e;
      text-align: center;
      margin-top: 8px;
      letter-spacing: 0.05em;
    }

    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
  </style>
</head>
<body>

<!-- SETUP -->
<div id="setup">
  <div class="setup-card">
    <div class="setup-label">API Zugang</div>
    <div class="setup-title">Brainstorm Studio</div>
    <div class="setup-sub">Anthropic API Key eingeben.<br>Bleibt lokal — wird nicht gespeichert.</div>
    <input
      id="apiKeyInput"
      type="password"
      class="setup-input"
      placeholder="sk-ant-..."
      autocomplete="off"
      autocorrect="off"
      autocapitalize="off"
    />
    <button class="setup-btn" id="confirmBtn" disabled>Bestätigen →</button>
  </div>
</div>

<!-- CHAT -->
<div id="chat">
  <div class="header">
    <div class="header-left">
      <div class="dot"></div>
      <span class="header-title">Brainstorm Studio</span>
    </div>
    <div class="header-right">
      <button class="btn-small" id="clearBtn" style="display:none">Löschen</button>
      <button class="btn-small btn-notion" id="notionBtn" style="display:none">→ Notion</button>
    </div>
  </div>

  <div class="messages" id="messages">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">◈</div>
      <div class="empty-text">Brainstorming starten.</div>
      <div class="empty-sub">Tippen oder Mikrofon → Notion speichern.</div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <textarea
        id="userInput"
        placeholder="Idee eingeben..."
        rows="1"
      ></textarea>
      <button class="icon-btn" id="micBtn" title="Spracheingabe">🎙</button>
      <button class="send-btn" id="sendBtn" disabled>↑</button>
    </div>
    <div class="hint">Enter = Senden · Shift+Enter = Neue Zeile</div>
  </div>
</div>

<script>
  const WEBHOOK = "https://n8n.louis-assel.de/webhook/brainstorm-to-notion";
  const MODEL = "claude-sonnet-4-6";
  const SYSTEM = `Du bist ein kreativer Brainstorming-Partner. Hilf dem Nutzer dabei, Ideen zu entwickeln, Projekte zu planen und Konzepte zu schärfen. Stelle gezielte Fragen, denke mit, gib konkrete Vorschläge. Sei direkt, präzise und inspirierend.`;

  let apiKey = "";
  let messages = [];
  let isLoading = false;
  let isRecording = false;
  let recognition = null;

  // Elements
  const setupEl = document.getElementById("setup");
  const chatEl = document.getElementById("chat");
  const apiKeyInput = document.getElementById("apiKeyInput");
  const confirmBtn = document.getElementById("confirmBtn");
  const messagesEl = document.getElementById("messages");
  const emptyState = document.getElementById("emptyState");
  const userInput = document.getElementById("userInput");
  const sendBtn = document.getElementById("sendBtn");
  const micBtn = document.getElementById("micBtn");
  const clearBtn = document.getElementById("clearBtn");
  const notionBtn = document.getElementById("notionBtn");

  // API key validation
  apiKeyInput.addEventListener("input", () => {
    confirmBtn.disabled = !apiKeyInput.value.startsWith("sk-");
  });

  apiKeyInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !confirmBtn.disabled) confirmKey();
  });

  confirmBtn.addEventListener("click", confirmKey);

  function confirmKey() {
    apiKey = apiKeyInput.value.trim();
    setupEl.style.display = "none";
    chatEl.style.display = "flex";
  }

  // Textarea auto-resize
  userInput.addEventListener("input", () => {
    userInput.style.height = "auto";
    userInput.style.height = Math.min(userInput.scrollHeight, 120) + "px";
    sendBtn.disabled = !userInput.value.trim() || isLoading;
  });

  userInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      if (!sendBtn.disabled) send();
    }
  });

  sendBtn.addEventListener("click", send);

  async function send() {
    const text = userInput.value.trim();
    if (!text || isLoading) return;

    userInput.value = "";
    userInput.style.height = "auto";
    sendBtn.disabled = true;
    isLoading = true;

    addMessage("user", text);
    messages.push({ role: "user", content: text });

    const typingEl = addTyping();

    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": apiKey,
          "anthropic-version": "2023-06-01",
        },
        body: JSON.stringify({
          model: MODEL,
          max_tokens: 1000,
          system: SYSTEM,
          messages,
        }),
      });
      const data = await res.json();
      typingEl.remove();
      const reply = data.content?.[0]?.text || "Fehler: Keine Antwort erhalten.";
      messages.push({ role: "assistant", content: reply });
      addMessage("assistant", reply);
    } catch (err) {
      typingEl.remove();
      addMessage("assistant", "❌ Verbindungsfehler: " + err.message);
    }

    isLoading = false;
    sendBtn.disabled = !userInput.value.trim();
    updateHeaderBtns();
  }

  function addMessage(role, content) {
    emptyState.style.display = "none";

    const wrap = document.createElement("div");
    wrap.className = `msg ${role}`;

    const label = document.createElement("div");
    label.className = "msg-label";
    label.textContent = role === "user" ? "Du" : "Claude";

    const bubble = document.createElement("div");
    bubble.className = "msg-bubble";
    bubble.textContent = content;

    wrap.appendChild(label);
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return wrap;
  }

  function addTyping() {
    const wrap = document.createElement("div");
    wrap.className = "msg assistant";

    const label = document.createElement("div");
    label.className = "msg-label";
    label.textContent = "Claude";

    const bubble = document.createElement("div");
    bubble.className = "msg-bubble typing";
    bubble.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';

    wrap.appendChild(label);
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return wrap;
  }

  function updateHeaderBtns() {
    const hasMessages = messages.length > 0;
    clearBtn.style.display = hasMessages ? "block" : "none";
    notionBtn.style.display = hasMessages ? "block" : "none";
  }

  // Clear chat
  clearBtn.addEventListener("click", () => {
    messages = [];
    messagesEl.innerHTML = "";
    messagesEl.appendChild(emptyState);
    emptyState.style.display = "flex";
    notionBtn.className = "btn-small btn-notion";
    notionBtn.textContent = "→ Notion";
    updateHeaderBtns();
  });

  // Save to Notion
  notionBtn.addEventListener("click", async () => {
    if (messages.length === 0) return;
    notionBtn.textContent = "Speichere...";
    notionBtn.disabled = true;

    const fullText = messages
      .map(m => `${m.role === "user" ? "Ich" : "Assistant"}: ${m.content}`)
      .join("\n\n");

    try {
      const res = await fetch(WEBHOOK, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text: fullText }),
      });
      if (res.ok) {
        notionBtn.className = "btn-small btn-notion success";
        notionBtn.textContent = "✓ Gespeichert";
      } else {
        throw new Error("HTTP " + res.status);
      }
    } catch (err) {
      notionBtn.className = "btn-small btn-notion error";
      notionBtn.textContent = "✗ Fehler";
    }
    notionBtn.disabled = false;
  });

  // Voice input
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  if (SpeechRecognition) {
    recognition = new SpeechRecognition();
    recognition.lang = "de-DE";
    recognition.continuous = false;
    recognition.interimResults = false;

    recognition.onresult = (e) => {
      const transcript = e.results[0][0].transcript;
      userInput.value = (userInput.value + " " + transcript).trim();
      userInput.dispatchEvent(new Event("input"));
    };

    recognition.onend = () => {
      isRecording = false;
      micBtn.className = "icon-btn";
      micBtn.textContent = "🎙";
    };

    recognition.onerror = () => {
      isRecording = false;
      micBtn.className = "icon-btn";
      micBtn.textContent = "🎙";
    };

    micBtn.addEventListener("click", () => {
      if (isRecording) {
        recognition.stop();
      } else {
        recognition.start();
        isRecording = true;
        micBtn.className = "icon-btn recording";
        micBtn.textContent = "⏹";
      }
    });
  } else {
    micBtn.style.display = "none";
  }
</script>
</body>
</html>
